spring.application.name=WorkPulse

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workpulse_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=workpulse-secret-key-must-be-very-long-at-least-256-bits-for-security
jwt.expiration=86400000